name: Publish to Maven Central

on:
#  push:
#    tags:
#      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}

      # ── 发布成功通知 ───────────────────────────────────────────────────
      - name: Publish success notice
        if: success()
        run: |
          echo "✅ Successfully published RAC modules to Maven Central"
          echo "   - top.resderx.rac:core:${GITHUB_REF_NAME}"
          echo "   - top.resderx.rac:mcp:${GITHUB_REF_NAME}"
          echo "   - top.resderx.rac:acp:${GITHUB_REF_NAME}"
          echo "   - top.resderx.rac:a2a:${GITHUB_REF_NAME}"
        shell: bash

      # ── 发布失败通知 ───────────────────────────────────────────────────
      - name: Publish failure notice
        if: failure()
        run: |
          echo "❌ Failed to publish RAC modules to Maven Central"
          echo "   Check credentials, GPG key, and module coordinates"
          exit 1
        shell: bash
